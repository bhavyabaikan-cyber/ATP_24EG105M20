<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white">

<div class="flex justify-between items-center px-6 py-3 bg-gray-100">
  <h1 class="font-semibold">Best City Guide</h1>
  <div class="space-x-4 text-sm text-teal-600">
    <span>ICE CREAM</span>
    <span>DONUTS</span>
    <span>TEA</span>
    <span>COFFEE</span>
  </div>
</div>

<div class="bg-teal-400 text-white text-center py-12">
  <div class="w-24 h-24 bg-blue-900 rounded-full mx-auto mb-4"></div>
  <h1 class="text-2xl md:text-3xl font-semibold">The Best City</h1>
  <p class="text-sm mt-2">The best drinks and eats in the best city ever.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 px-6 py-10">

  <div>
    <h2 class="font-semibold mb-2">Welcome!</h2>
    <p class="text-gray-600 text-sm">
      Everything in this city is worth waiting in line for...
    </p>
  </div>

  <div>
    <h2 class="font-semibold mb-2">Great food</h2>
    <div class="bg-teal-300 p-6 mb-2 rounded"></div>
    <p class="text-gray-600 text-sm">
      Croissant macaroon pie brownie...
    </p>
  </div>

  <div>
    <h2 class="font-semibold mb-2">How to get here</h2>
    <p class="text-gray-600 text-sm">
      Plane: Tiramisu caramels gummies chupa chups...
    </p>
  </div>

</div>

</body>
</html>
